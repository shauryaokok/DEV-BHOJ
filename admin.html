<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dev Bhoj — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0d1b3e;--navy2:#131f4a;--navy3:#1a2860;--gold:#C9A84C;--gold2:#e8c96a;--white:#F8F4EE;--gray:#8a9bb5;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid rgba(201,168,76,0.2);padding:48px 40px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-size:24px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);color:var(--white);font-family:'Poppins',sans-serif;font-size:14px;margin-bottom:16px;outline:none;transition:border-color 0.3s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:var(--navy);border:none;padding:13px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.3s;}
.login-btn:hover{background:var(--gold2);}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* ADMIN */
#adminScreen{display:none;}
.admin-nav{background:var(--navy2);border-bottom:1px solid rgba(201,168,76,0.2);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:60px;}
.admin-nav-logo{font-size:18px;font-weight:700;color:var(--gold);}
.admin-nav-logo span{font-size:11px;color:var(--gray);font-weight:400;margin-left:8px;}
.logout-btn{background:transparent;border:1px solid rgba(201,168,76,0.25);color:var(--gray);padding:6px 16px;font-family:'Poppins',sans-serif;font-size:11px;cursor:pointer;transition:all 0.3s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.admin-body{padding:32px 5%;max-width:1000px;margin:0 auto;}

/* TABS */
.admin-tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid rgba(201,168,76,0.15);}
.admin-tab{background:transparent;color:var(--gray);border:none;padding:12px 24px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s;margin-bottom:-1px;}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;}

/* FORM */
.form-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-family:'Poppins',sans-serif;font-size:13px;padding:10px 14px;outline:none;transition:border-color 0.3s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-select option{background:var(--navy2);}
.form-textarea{resize:vertical;min-height:70px;}
.submit-btn{background:var(--gold);color:var(--navy);border:none;padding:12px 28px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.3s;}
.submit-btn:hover{background:var(--gold2);}

/* MENU TABLE */
.menu-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-input{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-family:'Poppins',sans-serif;font-size:13px;padding:8px 14px;outline:none;flex:1;min-width:160px;}
.filter-select{background:var(--navy2);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-family:'Poppins',sans-serif;font-size:13px;padding:8px 14px;outline:none;}
.filter-select option{background:var(--navy2);}

.menu-table{width:100%;border-collapse:collapse;}
.menu-table th{background:var(--navy3);color:var(--gold);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 14px;text-align:left;font-weight:600;}
.menu-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;color:var(--white);}
.menu-table tr:hover td{background:rgba(255,255,255,0.03);}
.td-price{color:var(--gold);font-weight:600;}
.td-cat{font-size:11px;color:var(--gray);}
.action-btns{display:flex;gap:8px;}
.edit-btn,.del-btn{border:none;padding:5px 12px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;}
.edit-btn{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.edit-btn:hover{background:rgba(201,168,76,0.25);}
.del-btn{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.del-btn:hover{background:rgba(239,68,68,0.22);}

/* SPECIALS */
.special-form{background:var(--navy2);border:1px solid rgba(201,168,76,0.15);padding:24px;margin-bottom:24px;}
.specials-list{display:grid;gap:12px;}
.special-item{background:var(--navy2);border:1px solid rgba(201,168,76,0.12);padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;border-left:3px solid var(--gold);}
.special-item-info .s-name{font-size:15px;font-weight:600;color:var(--white);}
.special-item-info .s-price{font-size:14px;color:var(--gold);font-weight:700;}
.special-item-info .s-desc{font-size:12px;color:var(--gray);margin-top:3px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-box{background:var(--navy2);border:1px solid rgba(201,168,76,0.12);padding:20px;text-align:center;}
.stat-box-num{font-size:30px;font-weight:800;color:var(--gold);}
.stat-box-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-top:4px;}

.section-divider{height:1px;background:rgba(201,168,76,0.1);margin:28px 0;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Dev Bhoj</div>
    <div class="login-sub">Admin Panel · Liko Webz</div>
    <input class="login-input" type="password" placeholder="Enter admin password" id="passInput" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="loginError">❌ Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-nav">
    <div class="admin-nav-logo">Dev Bhoj Admin <span>by Liko Webz</span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="admin-body">

    <!-- STATS -->
    <div class="stats-row" id="statsRow"></div>

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('menu',this)">🍽️ Menu Items</button>
      <button class="admin-tab" onclick="switchTab('add',this)">➕ Add Dish</button>
      <button class="admin-tab" onclick="switchTab('specials',this)">⭐ Today's Specials</button>
    </div>

    <!-- PANEL: MENU ITEMS -->
    <div class="panel active" id="panel-menu">
      <div class="menu-filter">
        <input class="filter-input" type="text" placeholder="🔍 Search dish..." oninput="filterTable(this.value)"/>
        <select class="filter-select" onchange="filterByCat(this.value)" id="catFilter">
          <option value="">All Categories</option>
        </select>
      </div>
      <div style="overflow-x:auto;">
        <table class="menu-table" id="menuTable">
          <thead><tr><th>#</th><th>Dish Name</th><th>Price</th><th>Category</th><th>Actions</th></tr></thead>
          <tbody id="menuBody"></tbody>
        </table>
      </div>
    </div>

    <!-- PANEL: ADD DISH -->
    <div class="panel" id="panel-add">
      <div class="form-title" id="formTitle">➕ Add New Dish</div>
      <input type="hidden" id="editId"/>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Dish Name *</label>
          <input class="form-input" type="text" id="dishName" placeholder="e.g. Paneer Butter Masala"/>
        </div>
        <div class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input class="form-input" type="text" id="dishPrice" placeholder="e.g. 290"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Category *</label>
          <select class="form-select" id="dishCat">
            <option value="">Select Category</option>
            <option>Paneer Dishes</option><option>Mix Dishes</option>
            <option>Mushroom Dishes</option><option>Tandoori Starters</option>
            <option>Sizzlers</option><option>Chinese Starters</option>
            <option>Pizza</option><option>Pasta</option><option>Burger</option>
            <option>Sandwich</option><option>Snacks</option>
            <option>Roti & Breads</option><option>South Indian</option>
            <option>Rice & Biryani</option><option>Raita</option>
            <option>Salad</option><option>Soup</option><option>Sweets</option>
            <option>Tea & Coffee</option><option>Shakes</option>
            <option>Drinks</option><option>Ice Cream</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="submit-btn" onclick="saveDish()">Save Dish ✓</button>
        <button class="submit-btn" style="background:transparent;color:var(--gray);border:1px solid rgba(255,255,255,0.1);" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <!-- PANEL: SPECIALS -->
    <div class="panel" id="panel-specials">
      <div class="special-form">
        <div class="form-title">⭐ Add Today's Special</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Dish Name *</label>
            <input class="form-input" type="text" id="spName" placeholder="e.g. Dev Bhoj Spl. Sizzler"/>
          </div>
          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input class="form-input" type="text" id="spPrice" placeholder="e.g. 450"/>
          </div>
          <div class="form-group full">
            <label class="form-label">Description (optional)</label>
            <input class="form-input" type="text" id="spDesc" placeholder="e.g. Chef's signature dish — limited today!"/>
          </div>
        </div>
        <button class="submit-btn" onclick="addSpecial()">Add to Specials ⭐</button>
      </div>
      <div class="form-title">Current Specials <span id="spCount" style="color:var(--gray);font-weight:400;font-size:14px;"></span></div>
      <div class="specials-list" id="specialsList"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

let menuData = [];
let nextId = 213;
let filterQuery = '';
let filterCat = '';

function getMenu(){
  const d = localStorage.getItem(STORAGE_KEY);
  return d ? JSON.parse(d) : DEFAULT_MENU;
}
function saveMenu(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getSpecials(){
  const d = localStorage.getItem(SP_KEY);
  return d ? JSON.parse(d) : [];
}
function saveSpecials(data){
  localStorage.setItem(SP_KEY, JSON.stringify(data));
}

function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast',2800);
}

function doLogin(){
  const val = document.getElementById('passInput').value;
  if(val === PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    initAdmin();
  } else {
    document.getElementById('loginError').style.display='block';
    document.getElementById('passInput').value='';
  }
}

function logout(){
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('passInput').value='';
}

function initAdmin(){
  menuData = getMenu();
  nextId = Math.max(...menuData.map(d=>d.id||0)) + 1;
  renderStats();
  renderTable();
  renderCatFilter();
  renderSpecials();
}

function renderStats(){
  const cats = [...new Set(menuData.map(d=>d.cat))].length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box"><div class="stat-box-num">${menuData.length}</div><div class="stat-box-label">Total Dishes</div></div>
    <div class="stat-box"><div class="stat-box-num">${cats}</div><div class="stat-box-label">Categories</div></div>
    <div class="stat-box"><div class="stat-box-num">${getSpecials().length}</div><div class="stat-box-label">Today's Specials</div></div>
  `;
}

function renderCatFilter(){
  const cats = [...new Set(menuData.map(d=>d.cat))].sort();
  const sel = document.getElementById('catFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Categories</option>' +
    cats.map(c=>`<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join('');
}

function renderTable(){
  const tbody = document.getElementById('menuBody');
  let filtered = menuData.filter(d=>{
    const mq = !filterQuery || d.name.toLowerCase().includes(filterQuery.toLowerCase());
    const mc = !filterCat || d.cat === filterCat;
    return mq && mc;
  });
  tbody.innerHTML = filtered.map((d,i)=>`
    <tr>
      <td style="color:var(--gray)">${i+1}</td>
      <td>${d.name}</td>
      <td class="td-price">₹${d.price}</td>
      <td class="td-cat">${d.cat}</td>
      <td><div class="action-btns">
        <button class="edit-btn" onclick="editDish(${d.id})">Edit</button>
        <button class="del-btn" onclick="deleteDish(${d.id})">Delete</button>
      </div></td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--gray);padding:24px;">No dishes found</td></tr>';
}

function filterTable(q){ filterQuery=q; renderTable(); }
function filterByCat(c){ filterCat=c; renderTable(); }

function editDish(id){
  const dish = menuData.find(d=>d.id===id);
  if(!dish) return;
  document.getElementById('editId').value = id;
  document.getElementById('dishName').value = dish.name;
  document.getElementById('dishPrice').value = dish.price;
  document.getElementById('dishCat').value = dish.cat;
  document.getElementById('formTitle').textContent = '✏️ Edit Dish';
  switchTab('add', document.querySelectorAll('.admin-tab')[1]);
}

function cancelEdit(){
  document.getElementById('editId').value = '';
  document.getElementById('dishName').value = '';
  document.getElementById('dishPrice').value = '';
  document.getElementById('dishCat').value = '';
  document.getElementById('formTitle').textContent = '➕ Add New Dish';
}

function saveDish(){
  const name = document.getElementById('dishName').value.trim();
  const price = document.getElementById('dishPrice').value.trim();
  const cat = document.getElementById('dishCat').value;
  const editId = document.getElementById('editId').value;
  if(!name||!price||!cat){ showToast('❌ Please fill all fields','error'); return; }
  if(editId){
    const idx = menuData.findIndex(d=>d.id==editId);
    if(idx>-1){ menuData[idx]={...menuData[idx],name,price,cat}; }
    showToast('✅ Dish updated successfully!');
  } else {
    menuData.push({id:nextId++,name,price,cat});
    showToast('✅ Dish added successfully!');
  }
  saveMenu(menuData);
  cancelEdit();
  renderTable();
  renderStats();
  renderCatFilter();
  switchTab('menu', document.querySelectorAll('.admin-tab')[0]);
}

function deleteDish(id){
  if(!confirm('Delete this dish?')) return;
  menuData = menuData.filter(d=>d.id!==id);
  saveMenu(menuData);
  renderTable();
  renderStats();
  showToast('🗑️ Dish deleted');
}

function addSpecial(){
  const name = document.getElementById('spName').value.trim();
  const price = document.getElementById('spPrice').value.trim();
  const desc = document.getElementById('spDesc').value.trim();
  if(!name||!price){ showToast('❌ Name and price required','error'); return; }
  const specials = getSpecials();
  specials.push({id:Date.now(),name,price,desc});
  saveSpecials(specials);
  document.getElementById('spName').value='';
  document.getElementById('spPrice').value='';
  document.getElementById('spDesc').value='';
  renderSpecials();
  renderStats();
  showToast('⭐ Special added! Visible on homepage now.');
}

function deleteSpecial(id){
  const specials = getSpecials().filter(s=>s.id!==id);
  saveSpecials(specials);
  renderSpecials();
  renderStats();
  showToast('🗑️ Special removed');
}

function renderSpecials(){
  const specials = getSpecials();
  const list = document.getElementById('specialsList');
  const cnt = document.getElementById('spCount');
  cnt.textContent = `(${specials.length} active)`;
  if(!specials.length){
    list.innerHTML='<div style="color:var(--gray);font-size:13px;padding:16px;">No specials added yet.</div>';
    return;
  }
  list.innerHTML = specials.map(s=>`
    <div class="special-item">
      <div class="special-item-info">
        <div class="s-name">${s.name}</div>
        <div class="s-price">₹${s.price}</div>
        ${s.desc?`<div class="s-desc">${s.desc}</div>`:''}
      </div>
      <button class="del-btn" onclick="deleteSpecial(${s.id})">Remove</button>
    </div>
  `).join('');
}

function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

// Enter key on login
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('loginScreen').style.display!=='none') doLogin();
});
